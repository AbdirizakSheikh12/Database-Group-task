<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Travel Jabs</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 2px solid #2a9d8f;
            margin-bottom: 20px;
        }

        .nav-bar h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #2a9d8f;
        }

        .tabs button {
            margin-right: 10px;
            background-color: #e9ecef;
            color: #333;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .tabs button.active {
            background-color: #2a9d8f;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        table {
            border: 1px solid #ddd;
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }



        .btn-create {
            background-color: #007bff;
            color: white;
        }

        .btn-create:hover {
            background-color: #0056b3;
        }

        .btn-edit {
            background-color: #fd7e14;
            color: white;
            margin-right: 5px;
            font-size: 0.85rem;
            padding: 4px 8px;
        }

        .btn-edit:hover {
            background-color: #e86b0c;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            font-size: 0.85rem;
            padding: 4px 8px;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }

        .action-btns {
            white-space: nowrap;
        }

        .form-section {
            background-color: #f9f9f9;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .search-box {
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
            padding: 8px;
        }
    </style>
</head>

<body>
    <div class="nav-bar">
        <h1>Travel Jabs - Manager</h1>
        <div class="tabs">
            <button onclick="switchTab('appointments')" id="tab-btn-appointments" class="active">Appointments</button>
            <button onclick="switchTab('staff')" id="tab-btn-staff">Staff</button>
            <button onclick="switchTab('patients')" id="tab-btn-patients">Patients</button>
            <button onclick="switchTab('vaccines')" id="tab-btn-vaccines">Vaccines</button>
            <button onclick="switchTab('schedule')" id="tab-btn-schedule">Staff Schedule</button>
        </div>
        <button onclick="logout()" class="btn danger">Logout</button>
    </div>

    <div class="container">
        <!-- NEW TAB: CLINICIAN AVAILABILITY -->
        <div id="tab-schedule" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Clinician Availability & Capacity</h2>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div class="form-group" style="width: 250px;">
                    <label>Select Clinician</label>
                    <select id="scheduleClinicianSelect" onchange="loadManagerSchedule()">
                        <option value="">-- Load Clinicians --</option>
                    </select>
                </div>
                <div class="form-group" style="width: 200px;">
                    <label>Select Date</label>
                    <input type="date" id="scheduleDateSelect" class="search-box" onchange="loadManagerSchedule()">
                </div>
            </div>

            <div id="managerScheduleGrid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                <p>Please select a clinician and a date to view available capacity.</p>
            </div>
        </div>
        <!-- TAB 1: APPOINTMENTS -->
        <div id="tab-appointments" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Appointments</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="AptStaffFilter" onchange="filterAppointmentsList()"
                        style="padding: 6px; border-radius: 4px;">
                        <option value="">All Clinicians</option>
                    </select>
                    <button class="btn btn-create" onclick="showAppointmentForm()">Create Appointment</button>
                </div>
            </div>

            <div id="appointment-form-section" class="form-section">
                <h3 id="apt-form-title">New Appointment</h3>
                <form id="appointmentForm">
                    <input type="hidden" id="apt-id">
                    <div class="form-group">
                        <label>Date / Time</label>
                        <input type="datetime-local" id="AppointmentDatetime" required>
                    </div>
                    <div class="form-group">
                        <label>Patient</label>
                        <select id="AppointmentPatientID" required>
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <div class="form-group " style="color: black;">
                        <label>Clinic</label>
                        <select id="AppointmentClinicID" required>
                            <option value="" style="color: black;">Loading...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Staff</label>
                        <select id="AppointmentStaffID" required>
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="AppointmentNotes" rows="3" placeholder="Additional booking notes..."></textarea>
                    </div> <button type="submit" class="btn btn-create">Save</button>
                    <button type="button" class="btn" style="background: #6c757d;"
                        onclick="hideAppointmentForm()">Cancel</button>
                </form>
            </div>

            <div id="appointmentsList">Loading...</div>
        </div>

        <!-- TAB 2: STAFF -->
        <div id="tab-staff" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Staff</h2>
                <button class="btn btn-create" onclick="showStaffForm()">Create Staff</button>
            </div>

            <div id="staff-form-section" class="form-section">
                <h3 id="staff-form-title">New Staff</h3>
                <form id="staffForm">
                    <input type="hidden" id="staff-id">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="StaffFirstname" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="StaffLastname" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="StaffRoleID" required>
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Clinic</label>
                        <select id="StaffClinicID" required>
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-create">Save</button>
                    <button type="button" class="btn" style="background: #6c757d;"
                        onclick="hideStaffForm()">Cancel</button>
                </form>
            </div>

            <div id="staffList">Loading...</div>
        </div>

        <!-- TAB 3: PATIENTS -->
        <div id="tab-patients" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Patients</h2>
                <button class="btn btn-create" onclick="showPatientForm()">Create Patient</button>
            </div>

            <input type="text" id="patientSearch" class="search-box" placeholder="Search patients by name..."
                onkeyup="filterPatients()">

            <div id="patient-form-section" class="form-section">
                <h3 id="patient-form-title">New Patient</h3>
                <form id="patientForm">
                    <input type="hidden" id="patient-id">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="PatientFirstname" minlength="8" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="PatientLastname" minlength="8" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="PatientAddress" required>
                    </div>
                    <div class="form-group">
                        <label>Postcode</label>
                        <input type="text" id="PatientPostcode"
                            pattern="^(GIR\s?0AA|(?:(?:[A-PR-UWYZ][0-9]{1,2})|(?:[A-PR-UWYZ][A-HK-Y][0-9]{1,2})|(?:[A-PR-UWYZ][0-9][A-HJKPSTUW])|(?:[A-PR-UWYZ][A-HK-Y][0-9][ABEHMNPRVWXY]))\s?[0-9][ABD-HJLNP-UW-Z]{2})$"
                            title="Valid UK postcode required" required>
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="PatientAge" min="1" max="150" required>
                    </div>
                    <button type="submit" class="btn btn-create">Save</button>
                    <button type="button" class="btn" style="background: #6c757d;"
                        onclick="hidePatientForm()">Cancel</button>
                </form>
            </div>

            <div id="patientsList">Loading...</div>
        </div>

        <!-- TAB 4: VACCINES -->
        <div id="tab-vaccines" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Vaccines</h2>
                <button class="btn btn-create" onclick="showVaccineForm()">Add Vaccine</button>
            </div>

            <div id="vaccine-form-section" class="form-section">
                <h3 id="vaccine-form-title">New Vaccine</h3>
                <form id="vaccineForm">
                    <input type="hidden" id="vaccine-id">
                    <div class="form-group">
                        <label>Vaccine Name</label>
                        <input type="text" id="VaccineName" required>
                    </div>
                    <div class="form-group">
                        <label>Cost</label>
                        <input type="number" step="0.01" id="VaccineCost" required>
                    </div>
                    <button type="submit" class="btn btn-create">Save</button>
                    <button type="button" class="btn" style="background: #6c757d;"
                        onclick="hideVaccineForm()">Cancel</button>
                </form>
            </div>

            <div id="vaccinesList">Loading...</div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/manager.js"></script>
</body>

</html>
