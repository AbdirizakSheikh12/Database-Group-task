<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Jabs - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">✈️💉</div>
            <h1>Travel Jabs</h1>
            <p>Clinic Management System</p>
        </div>

        <div id="loginSection" class="fade-in">
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" required>
                        <option value="Manager">Manager</option>
                        <option value="Clinician">Clinician</option>
                        <option value="Patient">Patient (Login)</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary auth-submit-btn">Login</button>
                <div id="loginError" class="error-msg fade-in" style="display:none;"></div>
            </form>
            <p class="auth-footer">New patient? <a href="#" onclick="toggleRegister(event)">Register here</a></p>
        </div>

        <div id="registerSection" class="fade-in" style="display: none;">
            <h3 class="register-title">Patient Registration</h3>
            <form id="registerForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group half">
                        <label>First Name</label>
                        <input type="text" id="regFirstname" placeholder="Johnathon" minlength="8" required>
                    </div>
                    <div class="form-group half">
                        <label>Last Name</label>
                        <input type="text" id="regLastname" placeholder="Smithson" minlength="8" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="regAddress" placeholder="123 Example Street" required>
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label>Postcode</label>
                        <input type="text" id="regPostcode" placeholder="AB12 3CD"
                            pattern="^(GIR\s?0AA|(?:(?:[A-PR-UWYZ][0-9]{1,2})|(?:[A-PR-UWYZ][A-HK-Y][0-9]{1,2})|(?:[A-PR-UWYZ][0-9][A-HJKPSTUW])|(?:[A-PR-UWYZ][A-HK-Y][0-9][ABEHMNPRVWXY]))\s?[0-9][ABD-HJLNP-UW-Z]{2})$"
                            title="Must be a valid UK format e.g. AB12 3CD" required>
                    </div>
                    <div class="form-group half">
                        <label>Age</label>
                        <input type="number" id="regAge" placeholder="25" min="1" max="150" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email (Login)</label>
                    <input type="email" id="regEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn-action auth-submit-btn">Register Account</button>
                <div id="registerError" class="error-msg fade-in" style="display:none;"></div>
            </form>
            <p class="auth-footer">Already have an account? <a href="#" onclick="toggleLogin(event)">Back to Login</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function toggleRegister(e) {
            e.preventDefault();
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
        }
        function toggleLogin(e) {
            e.preventDefault();
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            login(email, password, role);
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                PatientFirstname: document.getElementById('regFirstname').value,
                PatientLastname: document.getElementById('regLastname').value,
                PatientAddress: document.getElementById('regAddress').value,
                PatientPostcode: document.getElementById('regPostcode').value,
                PatientAge: parseInt(document.getElementById('regAge').value)
            };

            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                // Post to backend database
                const response = await api.createPatient(data);

                // Use backend ID to simulate local registration mapping for login
                const newId = response.PatientID || response.id || Math.floor(Math.random() * 1000);

                // Add to localAuth system
                registerAccount(email, password, 'Patient', {
                    id: newId,
                    firstname: data.PatientFirstname,
                    lastname: data.PatientLastname
                });

                alert('Registration successful! Please login.');
                toggleLogin(new CustomEvent('click'));

            } catch (err) {
                const errDiv = document.getElementById('registerError');
                errDiv.textContent = "Registration failed: " + err.message;
                errDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
